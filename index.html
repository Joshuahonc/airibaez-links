<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Links</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f7f7f7;
      color: #111;
      min-height: 100vh;
    }

    .page {
      display: none;
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      padding: 56px 20px 64px;
    }

    .page.active { display: flex; }

    /* ── Instagram warning ─────────────────────────── */
    #page-warning {
      justify-content: center;
      text-align: center;
      gap: 24px;
    }

    .warning-icon {
      width: 64px;
      height: 64px;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .warning-icon svg {
      width: 32px;
      height: 32px;
      color: #111;
    }

    .warning-heading {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .warning-body {
      font-size: 15px;
      color: #555;
      line-height: 1.6;
      max-width: 300px;
    }

    .warning-steps {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 14px;
      padding: 20px 24px;
      text-align: left;
      width: 100%;
      max-width: 360px;
    }

    .warning-steps-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #999;
      margin-bottom: 14px;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .step:last-child { margin-bottom: 0; }

    .step-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #111;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .step-text { font-size: 14px; color: #333; line-height: 1.5; }
    .step-text strong { color: #111; font-weight: 600; }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #111;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      width: 100%;
      max-width: 360px;
      transition: opacity 0.15s;
    }

    .btn-primary:hover { opacity: 0.85; }
    .btn-primary svg { width: 16px; height: 16px; }

    .copy-hint { font-size: 13px; color: #999; }

    /* ── Links page ─────────────────────────────────── */
    #page-links { gap: 0; }

    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .avatar-wrap {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #e5e5e5;
      border: 2px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .avatar-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-wrap svg {
      width: 36px;
      height: 36px;
      color: #bbb;
    }

    .profile-name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .profile-bio {
      font-size: 13px;
      color: #888;
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
    }

    .links-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 440px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 14px;
      padding: 14px 16px;
      text-decoration: none;
      color: #111;
      transition: background 0.12s, border-color 0.12s, transform 0.12s;
    }

    .link-card:hover {
      background: #fafafa;
      border-color: #d0d0d0;
      transform: translateY(-1px);
    }

    .link-card:active { transform: translateY(0); }

    .card-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-icon svg { width: 26px; height: 26px; }

    .card-text { flex: 1; min-width: 0; }

    .card-title { font-size: 15px; font-weight: 600; }

    .card-sub {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    .card-arrow { color: #ccc; flex-shrink: 0; }

    footer { margin-top: 48px; font-size: 12px; color: #bbb; }

    /* ── Toast ───────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #111;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 50px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <!-- ── Page 1: Instagram warning ── -->
  <div class="page" id="page-warning">
    <div class="warning-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
    </div>
    <div class="warning-heading">Open in your browser</div>
    <div class="warning-body">
      You're viewing this inside Instagram's built-in browser. For links to work correctly, please open this page in Safari or Chrome.
    </div>
    <div class="warning-steps">
      <div class="warning-steps-label">How to open</div>
      <div id="steps-content"></div>
    </div>
    <a class="btn-primary" id="open-browser-btn" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      Open in Browser
    </a>
    <span class="copy-hint" id="copy-hint"></span>
  </div>

  <!-- ── Page 2: Social links (rendered from links.json) ── -->
  <div class="page" id="page-links">
    <div class="profile">
      <div class="avatar-wrap" id="avatar-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="profile-name" id="profile-name">Loading…</div>
      <div class="profile-bio" id="profile-bio"></div>
    </div>
    <div class="links-list" id="links-list"></div>
  </div>

  <div id="toast"></div>

  <script>
    // ── Platform icon + colour lookup ─────────────────
    const ARROW_SVG = `<svg class="card-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;

    const PLATFORMS = {
      linkme: {
        bg: "#f0f0f0",
        icon: `<svg viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`
      },
      instagram: {
        bg: "#fef0f5",
        icon: `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><defs><linearGradient id="ig" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#f09433"/><stop offset="50%" stop-color="#dc2743"/><stop offset="100%" stop-color="#bc1888"/></linearGradient></defs><rect x="2" y="2" width="20" height="20" rx="5" ry="5" stroke="url(#ig)"/><circle cx="12" cy="12" r="4" stroke="url(#ig)"/><circle cx="17.5" cy="6.5" r="0.5" fill="#dc2743" stroke="none"/></svg>`
      },
      tiktok: {
        bg: "#f0f0f0",
        icon: `<svg viewBox="0 0 24 24" fill="#111"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.28 8.28 0 0 0 4.83 1.54V6.78a4.85 4.85 0 0 1-1.06-.09z"/></svg>`
      },
      x: {
        bg: "#f0f0f0",
        icon: `<svg viewBox="0 0 24 24" fill="#111"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L2.004 2.25H8.08l4.263 5.634L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>`
      },
      twitter: {
        bg: "#f0f0f0",
        icon: `<svg viewBox="0 0 24 24" fill="#111"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L2.004 2.25H8.08l4.263 5.634L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>`
      },
      youtube: {
        bg: "#fff0f0",
        icon: `<svg viewBox="0 0 24 24" fill="#FF0000"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`
      },
      facebook: {
        bg: "#f0f4ff",
        icon: `<svg viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>`
      },
      linkedin: {
        bg: "#f0f6ff",
        icon: `<svg viewBox="0 0 24 24" fill="#0A66C2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`
      },
      spotify: {
        bg: "#f0fff4",
        icon: `<svg viewBox="0 0 24 24" fill="#1DB954"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>`
      },
      github: {
        bg: "#f0f0f0",
        icon: `<svg viewBox="0 0 24 24" fill="#111"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>`
      },
      default: {
        bg: "#f0f0f0",
        icon: `<svg viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`
      }
    };

    function getPlatform(name) {
      return PLATFORMS[name.toLowerCase()] || PLATFORMS.default;
    }

    // ── Render links from data ────────────────────────
    function renderProfile(data) {
      document.getElementById("profile-name").textContent = data.name || "Your Name";
      if (data.bio) {
        document.getElementById("profile-bio").textContent = data.bio;
      }
      if (data.avatar) {
        const wrap = document.getElementById("avatar-wrap");
        wrap.innerHTML = `<img src="${data.avatar}" alt="${data.name}" />`;
      }
    }

    function renderLinks(links) {
      const list = document.getElementById("links-list");
      list.innerHTML = links.map(item => {
        const p = getPlatform(item.platform);
        const label = item.label || item.platform;
        const sub = item.subtitle ? `<div class="card-sub">${item.subtitle}</div>` : "";
        return `
          <a class="link-card" href="${item.url}" target="_blank" rel="noopener">
            <div class="card-icon" style="background:${p.bg}">${p.icon}</div>
            <div class="card-text">
              <div class="card-title">${label}</div>
              ${sub}
            </div>
            ${ARROW_SVG}
          </a>`;
      }).join("");
    }

    // ── Load links.json ───────────────────────────────
    fetch("links.json")
      .then(r => {
        if (!r.ok) throw new Error("links.json not found");
        return r.json();
      })
      .then(data => {
        renderProfile(data);
        renderLinks(data.links || []);
      })
      .catch(() => {
        document.getElementById("profile-name").textContent = "Could not load links.json";
      });

    // ── In-app browser detection ──────────────────────
    const ua = navigator.userAgent || "";
    const preview  = new URLSearchParams(window.location.search).get("preview");
    const isInApp  = /Instagram|FBAN|FBAV/.test(ua) || ["warning","ios","android"].includes(preview);
    const isIOS    = /iPhone|iPad|iPod/.test(ua) || preview === "ios";
    const isAndroid = /Android/.test(ua) || preview === "android";

    function showPage(id) {
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2400);
    }

    function copyURL() {
      const url = window.location.href;
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url).then(() => showToast("Link copied to clipboard"));
        } else {
          const ta = Object.assign(document.createElement("textarea"), { value: url });
          ta.style.cssText = "position:fixed;opacity:0";
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
          showToast("Link copied to clipboard");
        }
      } catch (e) {}
    }

    if (isInApp) {
      showPage("page-warning");
      const stepsEl = document.getElementById("steps-content");
      const btn     = document.getElementById("open-browser-btn");
      const hint    = document.getElementById("copy-hint");

      if (isIOS) {
        stepsEl.innerHTML = `
          <div class="step"><div class="step-num">1</div><div class="step-text">Tap the <strong>···</strong> menu in the bottom right corner</div></div>
          <div class="step"><div class="step-num">2</div><div class="step-text">Tap <strong>Open in Safari</strong></div></div>`;
        btn.addEventListener("click", e => {
          e.preventDefault();
          copyURL();
          hint.textContent = "URL copied — paste it in Safari's address bar";
        });
      } else if (isAndroid) {
        stepsEl.innerHTML = `
          <div class="step"><div class="step-num">1</div><div class="step-text">Tap the <strong>⋮</strong> menu in the top right corner</div></div>
          <div class="step"><div class="step-num">2</div><div class="step-text">Tap <strong>Open in Chrome</strong> or <strong>Open in browser</strong></div></div>`;
        btn.href = window.location.href.replace(/^https?:\/\//, "intent://") + "#Intent;scheme=https;package=com.android.chrome;end";
      } else {
        stepsEl.innerHTML = `
          <div class="step"><div class="step-num">1</div><div class="step-text">Tap the <strong>menu</strong> icon (··· or ⋮)</div></div>
          <div class="step"><div class="step-num">2</div><div class="step-text">Select <strong>Open in browser</strong></div></div>`;
        btn.addEventListener("click", e => {
          e.preventDefault();
          copyURL();
          hint.textContent = "URL copied — paste it in your browser";
        });
      }
    } else {
      showPage("page-links");
    }
  </script>
</body>
</html>
